<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eid Salami Quiz Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #09090b;
            --accent: #acf7ff;
            --stone-800: #292524;
            --yellow-400: #facc15;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Hind Siliguri', sans-serif;
            margin: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        .app-container {
            width: 95%; max-width: 420px; height: 90vh;
            display: flex; flex-direction: column;
            background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, rgba(0,0,0,0) 100%);
            border-radius: 30px; padding: 25px; position: relative;
        }

        /* Question & Option Styles */
        .q-box { position: relative; width: 100%; margin-bottom: 30px; animation: slideUp 0.4s ease; }
        .q-front {
            padding: 20px; border-radius: 12px; font-size: 1.25rem; font-weight: 600;
            background: linear-gradient(to right, #f27121, #e94057, #8a2387);
            box-shadow: 0 10px 20px rgba(233, 64, 87, 0.3); text-align: center;
        }

        .opt-btn {
            min-height: 55px; width: 100%; display: flex; align-items: center;
            padding-left: 25px; border: 2px solid #acf7ff; color: #ffffff;
            font-size: 1.1rem; font-weight: 600; margin-bottom: 15px;
            background: rgba(172, 247, 255, 0.1); cursor: pointer; transition: 0.2s;
        }
        .opt-btn.selected { background: rgba(172, 247, 255, 0.4); border-color: #fff; }

        /* Wish Card Styles from your design */
        .card {
            width: 280px; height: 350px; padding: 5px; margin: 20px auto;
            background-image: linear-gradient(#ca1eb3, #FD2E24, #FFD701 70%);
            animation: slideUp 0.6s ease;
        }
        .card__content {
            background-color: #212121cf; backdrop-filter: blur(50px);
            width: 100%; height: 100%; padding: 15px; overflow: hidden;
        }
        .card-details { height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .text-title { color: #ff4d7d; font-size: 1.5rem; font-weight: bold; text-align: center; margin-bottom: 10px; z-index: 2;}
        .text-body { color: #ff8d79; text-align: center; font-size: 1rem; line-height: 1.5; z-index: 2; height: 100px;}
        .sunsetsvg { width: 313px; margin-left: -51.9px; margin-top: -100px; fill: black; opacity: 0.4; }
        #sun { fill: url(#MyGradient); }

        /* Custom Popup/Toast */
        #custom-toast {
            position: fixed; top: 20px; background: rgba(172, 247, 255, 0.2);
            backdrop-filter: blur(10px); border: 1px solid var(--accent);
            padding: 10px 20px; border-radius: 50px; color: white;
            z-index: 100; transform: translateY(-100px); transition: 0.5s;
        }
        #custom-toast.show { transform: translateY(0); }

        /* Buttons */
        .button { cursor: pointer; position: relative; display: inline-flex; align-items: center; justify-content: center; border: none; background: none; }
        .button > div { padding: 3px; border-radius: 1rem; background-color: var(--yellow-400); transform: translate(-4px, -4px); transition: 0.2s; box-shadow: 3.5px 3.5px 0 0 var(--yellow-400), 0 0 0 2px var(--stone-800); position: relative; z-index: 1; }
        .button:active > div { transform: translate(0, 0); box-shadow: none; }
        .button > div > div { background-color: var(--stone-800); border-radius: calc(1rem - 2px); padding: 12px 30px; color: #fff; font-weight: bold; }

        .hidden { display: none; }
        .share-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; word-break: break-all; border: 1px dashed var(--accent); margin: 20px 0; color: #acf7ff; text-align: center; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="custom-toast">লিঙ্ক কপি হয়েছে! ✅</div>

    <div class="app-container" id="app">
        <div id="screen-home" style="text-align: center; margin-top: 50px;">
            <h1 style="color:var(--accent); font-size: 2.5rem;">Eid Salami🌙</h1>
            <p style="opacity:0.8; margin-bottom: 60px;">সালামি জিততে সঠিক উত্তর দিন!</p>
            <div id="home-btns"></div>
        </div>

        <div id="screen-main" class="hidden">
            <div id="progress-text" style="color:var(--accent); font-size:0.9rem; margin-bottom:10px; font-weight: bold;"></div>
            <div class="q-box"><div class="q-front" id="display-q"></div></div>
            <div id="options-container"></div>
            <div id="action-btn-area" style="display:flex; justify-content:center; margin-top:auto;"></div>
        </div>

        <div id="screen-final" class="hidden">
            <div id="final-body"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBTKGsT5CzPBbEGmqHfvkGPDHfIa8c6fQs",
            authDomain: "eid-salami-quiz.firebaseapp.com",
            projectId: "eid-salami-quiz",
            storageBucket: "eid-salami-quiz.firebasestorage.app",
            messagingSenderId: "415072344103",
            appId: "1:415072344103:web:25ab5babeb023c89a11602",
            databaseURL: "https://eid-salami-quiz-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const wishes = [
            "দোস্ত, তুই সব সময় আমার পাশে থাকিস, এটাই বড় পাওয়া। তোর এবারের ঈদ কাটুক অনেক আনন্দে আর অনেক সালামি নিয়ে!",
            "তোর মত বন্ধু পাওয়া ভাগ্যের ব্যাপার। আশা করি আমাদের এই পাগলামি সারা জীবন থাকবে। ঈদ মোবারক আমার জান!",
            "সঠিক উত্তর দিয়ে প্রমান করলি তুই আমাকে কত চিনিস! তোর জন্য অনেক ভালোবাসা আর দোয়া রইল দোস্ত।",
            "সালামি তো জাস্ট একটা বাহানা, আসলে তোকে ঈদের উইশ করাই ছিল মেইন প্ল্যান। অনেক ভালো থাকিস বন্ধু!",
            "তোর জীবনটা যেন এই রঙের মতই রঙিন হয়। সব সময় হাসিখুশি থাকিস, আর আমাকে মাঝেমধ্যে ট্রিট দিস!",
            "তুই আমার বেস্ট ফ্রেন্ড ছিলি আর থাকবি। তোর এই হাসি যেন সারা জীবন অটুট থাকে। ঈদ মোবারক!",
            "তোর জন্য স্পেশাল একটা গিফট পেন্ডিং রইল। কুইজটা সুন্দরভাবে শেষ করার জন্য থ্যাংকস দোস্ত!",
            "ঈদ মানেই আনন্দ, আর তোর মত বন্ধু থাকলে সেই আনন্দ দ্বিগুণ হয়ে যায়। অনেক অনেক ঈদ মোবারক!",
            "তোর সব স্বপ্ন সত্যি হোক বন্ধু। এবারের ঈদ তোর জীবনের সেরা ঈদ হয়ে থাকুক এই দোয়াই করি।",
            "তুই শুধু আমার বন্ধুই না, তুই আমার লাইফের একটা ইম্পর্ট্যান্ট পার্ট। অনেক ভালোবাসি তোকে দোস্ত!",
            "সালামির টাকাটা কিন্তু বিকাশে পাঠিয়ে দিব, টেনশন করিস না! তুই সত্যি আমাকে অনেক ভালো চিনিস।",
            "তোর মত একজন ক্রেজি ফ্রেন্ড থাকার মজাই আলাদা। ঈদ মোবারক, চল এবারের ঈদে অনেক মাস্তি করি!",
            "তোর উজ্জ্বল ভবিষ্যতের জন্য সব সময় দোয়া করি। সব বাধা পেরিয়ে অনেক বড় হ বন্ধু!",
            "তুই আছিস বলেই জীবনটা এত সহজ মনে হয়। থ্যাংকস বন্ধু সব সময় পাশে থাকার জন্য। ঈদ মোবারক!",
            "সবশেষে এটাই বলব, তুই যেমন আছিস তেমনই থাকিস। তোর মত বন্ধু আর হয় না। শুভ ঈদ!"
        ];

        const readyQuestions = [
            { q: "আমার প্রিয় খাবার কোনটি?", opts: ["বিরিয়ানি", "কাচ্চি", "ফুচকা", "বার্গার"] },
            { q: "আমি ফ্রি সময়ে কি করি?", opts: ["মুভি দেখি", "কোডিং করি", "ঘুমাই", "ঘুরতে যাই"] },
            { q: "আমার প্রিয় ঋতু কোনটি?", opts: ["শীত", "বর্ষা", "বসন্ত", "শরৎ"] },
            { q: "চা নাকি কফি?", opts: ["দুধ চা", "রঙ চা", "কফি", "কোক"] },
            { q: "আমার প্রিয় রঙ কোনটি?", opts: ["কালো", "নীল", "সাদা", "লাল"] },
            { q: "ড্রিম ট্যুর কোথায়?", opts: ["সাজেক", "কক্সবাজার", "সিলেট", "বান্দরবান"] },
            { q: "আমি রাত জাগি নাকি সকালে উঠি?", opts: ["রাত জাগা পাখি", "খুব ভোরে উঠি", "ঠিক নেই", "সারাদিন ঘুমাই"] },
            { q: "প্রিয় খেলা কোনটি?", opts: ["PUBG/FF", "Cricket", "Football", "Ludo"] },
            { q: "আমি কি কার্টুন দেখি?", opts: ["হ্যাঁ অনেক", "মাঝেমাঝে", "একদম না", "আগে দেখতাম"] },
            { q: "আমাকে তোমার কেমন মনে হয়?", opts: ["খুব ভালো", "রাগী", "রহস্যময়", "পাগল"] }
        ];

        let quizData = [];
        let currentIndex = 0;
        let selectedAns = null;
        let score = 0;
        let mode = 'play';

        function init() {
            const params = new URLSearchParams(window.location.search);
            const quizId = params.get('id');
            const homeBtns = document.getElementById('home-btns');
            if(quizId) homeBtns.innerHTML = generateStoneBtn("কুইজ খেলুন", `startQuiz('${quizId}')`);
            else homeBtns.innerHTML = generateStoneBtn("কুইজ তৈরি করো", "startCreate()");
        }

        function generateStoneBtn(text, clickFn) {
            return `<button class="button" onclick="${clickFn}"><div><div><div>${text}</div></div></div></button>`;
        }

        function showScreen(id) {
            ['screen-home', 'screen-main', 'screen-final'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function startCreate() { mode = 'create'; showScreen('screen-main'); renderStep(); }

        function renderStep() {
            const data = readyQuestions[currentIndex];
            document.getElementById('progress-text').innerText = `সেটআপ: ${currentIndex + 1}/১০`;
            document.getElementById('display-q').innerText = data.q;
            let optsHtml = "";
            data.opts.forEach((o, i) => { optsHtml += `<div class="opt-btn" id="opt-${i}" onclick="selectOpt(${i})">${o}</div>`; });
            document.getElementById('options-container').innerHTML = optsHtml;
            document.getElementById('action-btn-area').innerHTML = generateStoneBtn("পরবর্তী", "handleNext()");
            selectedAns = null;
        }

        function selectOpt(idx) {
            document.querySelectorAll('.opt-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById(`opt-${idx}`).classList.add('selected');
            selectedAns = idx;
        }

        function handleNext() {
            if(selectedAns === null) return;
            if(mode === 'create') {
                quizData.push({ q: readyQuestions[currentIndex].q, opts: readyQuestions[currentIndex].opts, ans: selectedAns });
                if(currentIndex < 9) { currentIndex++; renderStep(); } else { saveQuiz(); }
            } else {
                if(selectedAns === quizData[currentIndex].ans) score++;
                if(currentIndex < quizData.length - 1) { currentIndex++; renderPlayStep(); } else { showFinalResult(); }
            }
        }

        function saveQuiz() {
            const id = "rakib" + Math.floor(Math.random() * 900000);
            document.getElementById('action-btn-area').innerHTML = "<p>সেভ হচ্ছে...</p>";
            db.ref('quizzes/' + id).set({ questions: quizData }).then(() => {
                showScreen('screen-final');
                const link = window.location.origin + window.location.pathname + "?id=" + id;
                document.getElementById('final-body').innerHTML = `
                    <h2 style="text-align:center; color:var(--accent);">Ready! 🚀</h2>
                    <div class="share-box">${link}</div>
                    <div style="display:flex; justify-content:center;">${generateStoneBtn("লিঙ্ক কপি করুন", `copyLink('${link}')`)}</div>
                `;
            });
        }

        function startQuiz(id) {
            mode = 'play';
            db.ref('quizzes/' + id).once('value', snap => {
                if(snap.exists()) {
                    quizData = snap.val().questions;
                    showScreen('screen-main');
                    renderPlayStep();
                }
            });
        }

        function renderPlayStep() {
            const data = quizData[currentIndex];
            document.getElementById('progress-text').innerText = `প্রশ্ন: ${currentIndex + 1}/${quizData.length}`;
            document.getElementById('display-q').innerText = data.q;
            let optsHtml = "";
            data.opts.forEach((o, i) => { optsHtml += `<div class="opt-btn" id="opt-${i}" onclick="selectOpt(${i})">${o}</div>`; });
            document.getElementById('options-container').innerHTML = optsHtml;
            document.getElementById('action-btn-area').innerHTML = generateStoneBtn("সাবমিট", "handleNext()");
            selectedAns = null;
        }

        function typeWriter(text, element, speed = 50) {
            let i = 0;
            element.innerHTML = "";
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                }
            }
            type();
        }

        function showFinalResult() {
            showScreen('screen-final');
            const randomWish = wishes[Math.floor(Math.random() * wishes.length)];
            
            document.getElementById('final-body').innerHTML = `
                <div style="text-align:center;">
                    <h2 style="color:var(--yellow-400); margin-bottom:5px;">Result: ${score}/${quizData.length}</h2>
                    <h3 style="color:var(--accent); font-size:1.8rem; margin-top:0;">সালামি: ৳${score * 100}</h3>
                </div>
                
                <div class="card">
                    <div class="card__content">
                        <div class="card-details">
                            <p class="text-title">Special Wish</p>
                            <p class="text-body" id="wish-text"></p>
                        </div>
                        <svg class="sunsetsvg" viewBox="0 0 1312 876">
                            <defs>
                                <linearGradient id="MyGradient" gradientTransform="rotate(90)">
                                    <stop offset="5%" stop-color="#ff632a"></stop>
                                    <stop offset="95%" stop-color="#ffd900"></stop>
                                </linearGradient>
                            </defs>
                            <g transform="translate(0,876) scale(0.1,-0.1)">
                                <path id="sun" d="M6370 3905 c-52 -7 -135 -25 -184 -40 -88 -25 -236 -83 -236 -91 0 -2 276 -4 613 -4 l612 1 -38 20 c-54 28 -229 85 -322 104 -111 23 -327 28 -445 10z"></path>
                                <path id="sun" d="M5813 3697 c-126 -85 -205 -77 746 -77 945 0 874 -7 750 75 l-68 45 -683 -1 -683 0 -62 -42z"></path>
                            </g>
                        </svg>
                    </div>
                </div>
                <div style="display:flex; justify-content:center; margin-top:10px;">
                    ${generateStoneBtn("হোমে ফিরুন", "location.href=window.location.pathname")}
                </div>
            `;
            setTimeout(() => {
                typeWriter(randomWish, document.getElementById('wish-text'));
            }, 800);
        }

        function copyLink(txt) {
            navigator.clipboard.writeText(txt).then(() => {
                const toast = document.getElementById('custom-toast');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            });
        }

        init();
    </script>
</body>
</html>
