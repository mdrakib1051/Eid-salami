<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eid Salami Quiz Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #09090b;
            --accent: #acf7ff;
            --stone-50: #fafaf9;
            --stone-800: #292524;
            --yellow-400: #facc15;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Hind Siliguri', sans-serif;
            margin: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        .app-container {
            width: 95%; max-width: 420px; height: 90vh;
            display: flex; flex-direction: column;
            background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, rgba(0,0,0,0) 100%);
            border-radius: 30px; padding: 25px; position: relative;
        }

        .q-box { position: relative; width: 100%; margin-bottom: 30px; animation: slideUp 0.4s ease; }
        .q-front {
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px; border-radius: 12px; font-size: 1.25rem; font-weight: 600;
            color: white; background: linear-gradient(to right, #f27121, #e94057, #8a2387);
            box-shadow: 0 10px 20px rgba(233, 64, 87, 0.3);
        }

        .opt-btn {
            min-height: 55px; width: 100%; display: flex; align-items: center;
            justify-content: flex-start; padding-left: 25px; position: relative;
            cursor: pointer; border: 2px solid #acf7ff; color: #ffffff;
            font-size: 1.1rem; font-weight: 600; margin-bottom: 15px;
            background: linear-gradient(90deg, rgba(110, 239, 255, 0.4) -12.74%, rgba(106, 224, 255, 0.1) 56.76%);
            transition: 0.2s;
        }

        .opt-btn:before {
            content: ""; width: 4px; height: 28px; background: #19173b;
            border: 2px solid #acf7ff; transform: rotate(-45deg);
            position: absolute; bottom: -8px; left: 4px; border-bottom-left-radius: 10px;
        }

        .opt-btn:after { content: ""; position: absolute; left: -2px; bottom: -2px; border-top: 15px solid transparent; border-left: 15px solid #fffcf7; }
        .opt-btn.selected { background: rgba(172, 247, 255, 0.4); border-color: #fff; box-shadow: 0 0 15px rgba(172, 247, 255, 0.3); }

        .button-wrapper { display: flex; justify-content: center; margin-top: auto; position: relative; }
        .button { cursor: pointer; position: relative; display: inline-flex; align-items: center; justify-content: center; border: none; background: none; }
        .button::before {
            content: ""; position: absolute; z-index: 0; height: 180%; aspect-ratio: 1;
            background: white; clip-path: polygon(100% 50%, 91.48% 56.57%, 97.55% 65.45%, 87.42% 69.07%, 90.45% 79.39%, 79.7% 79.7%, 79.39% 90.45%, 69.07% 87.42%, 65.45% 97.55%, 56.57% 91.48%, 50% 100%, 43.43% 91.48%, 34.55% 97.55%, 30.93% 87.42%, 20.61% 90.45%, 20.3% 79.7%, 9.55% 79.39%, 12.58% 69.07%, 2.45% 65.45%, 8.52% 56.57%, 0% 50%, 8.52% 43.43%, 2.45% 34.55%, 12.58% 30.93%, 9.55% 20.61%, 20.3% 20.3%, 20.61% 9.55%, 30.93% 12.58%, 34.55% 2.45%, 43.43% 8.52%, 50% 0%, 56.57% 8.52%, 65.45% 2.45%, 69.07% 12.58%, 79.39% 9.55%, 79.7% 20.3%, 90.45% 20.61%, 87.42% 30.93%, 97.55% 34.55%, 91.48% 43.43%);
            animation: star-rotate 4s linear infinite; opacity: 0.1;
        }
        .button > div { padding: 3px; border-radius: 1rem; background-color: var(--yellow-400); transform: translate(-4px, -4px); transition: 0.2s; box-shadow: 3.5px 3.5px 0 0 var(--yellow-400), 0 0 0 2px var(--stone-800); position: relative; z-index: 1; }
        .button:active > div { transform: translate(0, 0); box-shadow: none; }
        .button > div > div { background-color: var(--stone-800); border-radius: calc(1rem - 2px); padding: 12px 30px; color: #fff; font-weight: bold; font-size: 1.1rem; }

        .hidden { display: none; }
        .score-display { font-size: 3.5rem; color: var(--yellow-400); text-align: center; font-weight: 700; margin: 20px 0; }
        .share-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; word-break: break-all; border: 1px dashed var(--accent); margin: 20px 0; color: #acf7ff; text-align: center; font-size: 0.85rem; }
        
        @keyframes star-rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="app-container" id="app">
        <div id="screen-home" style="text-align: center; margin-top: 50px;">
            <h1 style="color:var(--accent); font-size: 2.5rem; margin-bottom: 10px;">Eid Salami🌙</h1>
            <p style="opacity:0.8; margin-bottom: 60px;">সালামি জিততে সঠিক উত্তর দিন!</p>
            <div id="home-btns"></div>
        </div>

        <div id="screen-main" class="hidden">
            <div id="progress-text" style="color:var(--accent); font-size:0.9rem; margin-bottom:10px; font-weight: bold;"></div>
            <div class="q-box"><div class="q-front" id="display-q"></div></div>
            <div id="options-container"></div>
            <div id="action-btn-area" class="button-wrapper"></div>
        </div>

        <div id="screen-final" class="hidden">
            <h1 style="text-align: center; color: var(--accent);">Result 🎉</h1>
            <div id="final-body"></div>
        </div>
    </div>

    <script>
        // --- আপনার স্ক্রিনশট থেকে নেওয়া ফায়ারবেস কনফিগারেশন ---
        const firebaseConfig = {
            apiKey: "AIzaSyBTKGsT5CzPBbEGmqHfvkGPDHfIa8c6fQs",
            authDomain: "eid-salami-quiz.firebaseapp.com",
            projectId: "eid-salami-quiz",
            storageBucket: "eid-salami-quiz.firebasestorage.app",
            messagingSenderId: "415072344103",
            appId: "1:415072344103:web:25ab5babeb023c89a11602",
            databaseURL: "https://eid-salami-quiz-default-rtdb.firebaseio.com" // এটি আপনার প্রজেক্টের লিঙ্কের সাথে মিল রেখে বসানো হয়েছে
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const readyQuestions = [
            { q: "আমার প্রিয় খাবার কোনটি?", opts: ["বিরিয়ানি", "কাচ্চি", "ফুচকা", "বার্গার"] },
            { q: "আমি ফ্রি সময়ে কি করি?", opts: ["মুভি দেখি", "কোডিং করি", "ঘুমাই", "ঘুরতে যাই"] },
            { q: "আমার প্রিয় ঋতু কোনটি?", opts: ["শীত", "বর্ষা", "বসন্ত", "শরৎ"] },
            { q: "চা নাকি কফি?", opts: ["দুধ চা", "রঙ চা", "কফি", "কোক"] },
            { q: "আমার প্রিয় রঙ কোনটি?", opts: ["কালো", "নীল", "সাদা", "লাল"] },
            { q: "ড্রিম ট্যুর কোথায়?", opts: ["সাজেক", "কক্সবাজার", "সিলেট", "বান্দরবান"] },
            { q: "আমি রাত জাগি নাকি সকালে উঠি?", opts: ["রাত জাগা পাখি", "খুব ভোরে উঠি", "ঠিক নেই", "সারাদিন ঘুমাই"] },
            { q: "প্রিয় খেলা কোনটি?", opts: ["PUBG/FF", "Cricket", "Football", "Ludo"] },
            { q: "আমি কি কার্টুন দেখি?", opts: ["হ্যাঁ অনেক", "মাঝেমাঝে", "একদম না", "আগে দেখতাম"] },
            { q: "আমাকে তোমার কেমন মনে হয়?", opts: ["খুব ভালো", "রাগী", "রহস্যময়", "পাগল"] }
        ];

        let quizData = [];
        let currentIndex = 0;
        let selectedAns = null;
        let score = 0;
        let mode = 'play';

        function init() {
            const params = new URLSearchParams(window.location.search);
            const quizId = params.get('id');
            const homeBtns = document.getElementById('home-btns');
            
            if(quizId) { homeBtns.innerHTML = generateStoneBtn("কুইজ খেলুন", `startQuiz('${quizId}')`); } 
            else { homeBtns.innerHTML = generateStoneBtn("কুইজ তৈরি করো", "startCreate()"); }
        }

        function generateStoneBtn(text, clickFn) {
            return `<button class="button" onclick="${clickFn}"><div><div><div>${text}</div></div></div></button>`;
        }

        function startCreate() { mode = 'create'; showScreen('screen-main'); renderStep(); }

        function renderStep() {
            const data = readyQuestions[currentIndex];
            document.getElementById('progress-text').innerText = `সেটআপ: ${currentIndex + 1}/১০`;
            document.getElementById('display-q').innerText = data.q;
            let optsHtml = "";
            data.opts.forEach((o, i) => { optsHtml += `<div class="opt-btn" id="opt-${i}" onclick="selectOpt(${i})">${o}</div>`; });
            document.getElementById('options-container').innerHTML = optsHtml;
            document.getElementById('action-btn-area').innerHTML = generateStoneBtn("পরবর্তী", "handleNext()");
            selectedAns = null;
        }

        function selectOpt(idx) {
            document.querySelectorAll('.opt-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById(`opt-${idx}`).classList.add('selected');
            selectedAns = idx;
        }

        function handleNext() {
            if(selectedAns === null) return alert("উত্তর সিলেক্ট করো!");
            if(mode === 'create') {
                quizData.push({ q: readyQuestions[currentIndex].q, opts: readyQuestions[currentIndex].opts, ans: selectedAns });
                if(currentIndex < 9) { currentIndex++; renderStep(); } else { saveQuiz(); }
            } else {
                if(selectedAns === quizData[currentIndex].ans) score++;
                if(currentIndex < quizData.length - 1) { currentIndex++; renderPlayStep(); } else { showFinalResult(); }
            }
        }

        function saveQuiz() {
            const id = "rakib" + Math.floor(Math.random() * 900000);
            document.getElementById('action-btn-area').innerHTML = "<p>সেভ হচ্ছে...</p>";
            db.ref('quizzes/' + id).set({ questions: quizData }).then(() => {
                showScreen('screen-final');
                const link = window.location.origin + window.location.pathname + "?id=" + id;
                document.getElementById('final-body').innerHTML = `
                    <p style="text-align:center;">লিঙ্কটি বন্ধুদের পাঠান:</p>
                    <div class="share-box">${link}</div>
                    <div style="display:flex; justify-content:center;">${generateStoneBtn("লিঙ্ক কপি করুন", `copyLink('${link}')`)}</div>
                `;
            });
        }

        function startQuiz(id) {
            mode = 'play';
            db.ref('quizzes/' + id).once('value', snap => {
                if(snap.exists()) {
                    quizData = snap.val().questions;
                    showScreen('screen-main');
                    renderPlayStep();
                } else { alert("Quiz not found!"); location.href=window.location.pathname; }
            });
        }

        function renderPlayStep() {
            const data = quizData[currentIndex];
            document.getElementById('progress-text').innerText = `প্রশ্ন: ${currentIndex + 1}/${quizData.length}`;
            document.getElementById('display-q').innerText = data.q;
            let optsHtml = "";
            data.opts.forEach((o, i) => { optsHtml += `<div class="opt-btn" id="opt-${i}" onclick="selectOpt(${i})">${o}</div>`; });
            document.getElementById('options-container').innerHTML = optsHtml;
            document.getElementById('action-btn-area').innerHTML = generateStoneBtn("সাবমিট", "handleNext()");
            selectedAns = null;
        }

        function showFinalResult() {
            showScreen('screen-final');
            document.getElementById('final-body').innerHTML = `
                <div class="score-display">৳${score * 100}</div>
                <p style="text-align:center; font-size: 1.2rem;">আপনার সালামি জমা হয়েছে!</p>
                <div style="display:flex; justify-content:center; margin-top:40px;">
                    ${generateStoneBtn("হোমে ফিরুন", "location.href=window.location.pathname")}
                </div>
            `;
        }

        function showScreen(id) {
            ['screen-home', 'screen-main', 'screen-final'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function copyLink(txt) { navigator.clipboard.writeText(txt).then(() => alert("কপি হয়েছে!")); }

        init();
    </script>
</body>
</html>
