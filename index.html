<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eid Salami Quiz | Rakib</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Rubik:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #09090b;
            --accent: #acf7ff;
            --stone-50: #fafaf9;
            --stone-800: #292524;
            --yellow-400: #facc15;
            --cyber-blue: #acf7ff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Hind Siliguri', sans-serif;
            margin: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        .app-container {
            width: 95%; max-width: 420px; height: 92vh;
            display: flex; flex-direction: column;
            background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, rgba(0,0,0,0) 100%);
            border-radius: 30px; padding: 25px; position: relative;
            border: 1px solid rgba(172, 247, 255, 0.1);
        }

        /* --- Input Style --- */
        .name-input {
            width: 100%; padding: 15px; border-radius: 12px;
            background: rgba(255,255,255,0.05); border: 2px solid var(--accent);
            color: #fff; font-size: 1.2rem; text-align: center;
            margin-bottom: 30px; font-family: 'Hind Siliguri';
        }

        /* --- Question Box --- */
        .q-box { width: 100%; margin-bottom: 25px; }
        .q-front {
            padding: 22px; border-radius: 15px; font-size: 1.5rem; font-weight: 700;
            background: linear-gradient(135deg, #f27121, #e94057, #8a2387);
            box-shadow: 0 10px 25px rgba(233, 64, 87, 0.3); text-align: center;
        }

        /* --- Cyber Option Button --- */
        .opt-cyber-btn {
            min-height: 58px; width: 100%; display: flex; align-items: center;
            padding-left: 25px; position: relative; cursor: pointer;
            border: 2px solid var(--cyber-blue); color: #ffffff;
            font-size: 1.2rem; font-weight: 600; margin-bottom: 12px;
            background: linear-gradient(90deg, rgba(110, 239, 255, 0.2) 0%, rgba(106, 224, 255, 0.05) 100%);
            transition: 0.3s; opacity: 0; animation: slideUp 0.4s forwards;
        }
        .opt-cyber-btn:after {
            content: ""; position: absolute; left: -2px; bottom: -2px;
            border-top: 14px solid transparent; border-left: 14px solid #fffcf7;
        }
        .opt-cyber-btn.selected { background: rgba(172, 247, 255, 0.3); border-color: #fff; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Uiverse.io Button CSS (The Spinning Star) --- */
        .button {
            font-family: "Rubik", sans-serif; cursor: pointer; position: relative;
            display: inline-flex; align-items: center; justify-content: center;
            font-weight: bold; line-height: 1; font-size: 1.1rem; border-radius: 1rem;
            outline: 2px solid transparent; outline-offset: 6px; color: var(--stone-50);
            background: none; border: none; padding: 0; margin-top: 30px;
        }

        .button::before {
            content: ""; position: absolute; z-index: 0; height: 220%;
            max-height: 120px; aspect-ratio: 1; margin: auto;
            background: white; clip-path: polygon(100% 50%, 91.48% 56.57%, 97.55% 65.45%, 87.42% 69.07%, 90.45% 79.39%, 79.7% 79.7%, 79.39% 90.45%, 69.07% 87.42%, 65.45% 97.55%, 56.57% 91.48%, 50% 100%, 43.43% 91.48%, 34.55% 97.55%, 30.93% 87.42%, 20.61% 90.45%, 20.3% 79.7%, 9.55% 79.39%, 12.58% 69.07%, 2.45% 65.45%, 8.52% 56.57%, 0% 50%, 8.52% 43.43%, 2.45% 34.55%, 12.58% 30.93%, 9.55% 20.61%, 20.3% 20.3%, 20.61% 9.55%, 30.93% 12.58%, 34.55% 2.45%, 43.43% 8.52%, 50% 0%, 56.57% 8.52%, 65.45% 2.45%, 69.07% 12.58%, 79.39% 9.55%, 79.7% 20.3%, 90.45% 20.61%, 87.42% 30.93%, 97.55% 34.55%, 91.48% 43.43%);
            animation: star-rotate 4s linear infinite; opacity: 0.1; transition: opacity 150ms ease;
        }

        .button:hover::before { opacity: 0.6; }

        .button > div {
            padding: 2px; border-radius: 1rem; background-color: var(--yellow-400);
            transform: translate(-4px, -4px); transition: all 150ms ease;
            box-shadow: 0.5px 0.5px 0 0 var(--yellow-400), 2px 2px 0 0 var(--yellow-400), 0 0 0 2px var(--stone-800), 0 0 0 4px var(--stone-50);
        }

        .button:hover > div { transform: translate(0, 0); box-shadow: 0 0 0 0 var(--yellow-400), 0 0 0 2px var(--stone-800), 0 0 0 4px var(--stone-50); }

        .button > div > div {
            position: relative; border-radius: calc(1rem - 2px); background-color: var(--stone-800); overflow: hidden;
        }

        .button > div > div::before {
            content: ""; position: absolute; inset: 0; border-radius: 1rem; opacity: 0.15;
            background-image: radial-gradient(rgb(255 255 255 / 80%) 20%, transparent 20%), radial-gradient(rgb(255 255 255 / 100%) 20%, transparent 20%);
            background-position: 0 0, 4px 4px; background-size: 8px 8px;
            animation: dots 0.4s infinite linear;
        }

        .button > div > div > div {
            position: relative; display: flex; align-items: center;
            padding: 0.8rem 1.8rem; gap: 0.25rem; filter: drop-shadow(0 -1px 0 var(--stone-800));
        }

        .button:active > div > div > div { transform: translateY(2px); }

        @keyframes star-rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes dots { 0% { background-position: 0 0, 4px 4px; } 100% { background-position: 8px 0, 12px 4px; } }

        /* --- Wish Card --- */
        .card {
            width: 100%; max-width: 300px; height: 320px; padding: 5px; margin: 15px auto;
            background-image: linear-gradient(#ca1eb3, #FD2E24, #FFD701 70%);
            border-radius: 15px; animation: slideUp 0.8s ease;
        }
        .card__content {
            background-color: #0f0f0f; width: 100%; height: 100%; padding: 20px; border-radius: 11px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative; overflow: hidden;
        }
        .text-body { color: #ffcc00; text-align: center; font-size: 1.15rem; line-height: 1.6; font-weight: 600; z-index: 2;}

        /* Wish Card sunset SVG (added back) */
        .sunsetsvg { width: 313px; margin-left: -51.9px; margin-top: -100px; fill: black; opacity: 0.35; position: absolute; z-index: 1;}
        #sun { fill: url(#MyGradient); }

        .hidden { display: none; }
        .share-box { background: rgba(255,255,255,0.08); padding: 15px; border-radius: 12px; border: 1.5px dashed var(--accent); margin: 20px 0; color: #acf7ff; text-align: center; }
        #custom-toast { position: fixed; top: 30px; background: #fff; padding: 12px 30px; border-radius: 50px; color: #000; font-weight: 800; z-index: 9999; transform: translateY(-150px); transition: 0.5s; }
        #custom-toast.show { transform: translateY(0); }
    </style>
</head>
<body>

    <div id="custom-toast">Link Copied! ✅</div>

    <div class="app-container" id="app">
        <div id="screen-home" style="text-align: center; margin-top: 40px;">
            <h1 style="color:var(--accent); font-size: 3rem;">Eid Salami🌙</h1>
            <input type="text" id="user-name" class="name-input" placeholder="আপনার নাম লিখুন...">
            <div id="home-btns"></div>
        </div>

        <div id="screen-main" class="hidden">
            <div id="progress-text" style="color:var(--accent); text-align: center; margin-bottom: 10px; font-weight: bold;"></div>
            <div id="question-area"></div>
            <div id="options-container"></div>
            <div id="action-btn-area" style="display: flex; justify-content: center;"></div>
        </div>

        <div id="screen-final" class="hidden">
            <div id="final-body"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBTKGsT5CzPBbEGmqHfvkGPDHfIa8c6fQs",
            authDomain: "eid-salami-quiz.firebaseapp.com",
            projectId: "eid-salami-quiz",
            storageBucket: "eid-salami-quiz.firebasestorage.app",
            messagingSenderId: "415072344103",
            appId: "1:415072344103:web:25ab5babeb023c89a11602",
            databaseURL: "https://eid-salami-quiz-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let userName = "বন্ধু";
        let quizData = [];
        let currentIndex = 0;
        let selectedAns = null;
        let score = 0;
        let mode = 'play';

        const readyQuestions = [
            { q: "আমার প্রিয় খাবার কোনটি?", opts: ["বিরিয়ানি", "কাচ্চি", "ফুচকা", "বার্গার"] },
            { q: "আমি ফ্রি সময়ে কি করি?", opts: ["মুভি দেখি", "কোডিং করি", "ঘুমাই", "ঘুরতে যাই"] },
            { q: "আমার প্রিয় ঋতু কোনটি?", opts: ["শীত", "বর্ষা", "বসন্ত", "শরৎ"] },
            { q: "চা নাকি কফি?", opts: ["দুধ চা", "রঙ চা", "কফি", "কোক"] },
            { q: "আমার প্রিয় রঙ কোনটি?", opts: ["কালো", "নীল", "সাদা", "লাল"] },
            { q: "ড্রিম ট্যুর কোথায়?", opts: ["সাজেক", "কক্সবাজার", "সিলেট", "বান্দরবান"] },
            { q: "আমি রাত জাগি নাকি সকালে উঠি?", opts: ["রাত জাগা পাখি", "খুব ভোরে উঠি", "ঠিক নেই", "সারাদিন ঘুমাই"] },
            { q: "প্রিয় খেলা কোনটি?", opts: ["PUBG/FF", "Cricket", "Football", "Ludo"] },
            { q: "আমি কি কার্টুন দেখি?", opts: ["হ্যাঁ অনেক", "মাঝেমাঝে", "একদম না", "আগে দেখতাম"] },
            { q: "আমাকে তোমার কেমন মনে হয়?", opts: ["খুব ভালো", "রাগী", "রহস্যময়", "পাগল"] }
        ];

        function init() {
            const params = new URLSearchParams(window.location.search);
            const quizId = params.get('id');
            const homeBtns = document.getElementById('home-btns');
            if(quizId) homeBtns.innerHTML = generateUiverseBtn("কুইজ খেলুন", `startQuiz('${quizId}')`);
            else homeBtns.innerHTML = generateUiverseBtn("কুইজ তৈরি করো", "startCreate()");
        }

        function generateUiverseBtn(text, clickFn) {
            return `
                <button class="button" onclick="${clickFn}">
                    <div><div><div>${text}</div></div></div>
                </button>
            `;
        }

        function validateName() {
            const val = document.getElementById('user-name').value.trim();
            if(val) { userName = val; return true; }
            alert("নাম লিখুন!"); return false;
        }

        function showScreen(id) {
            ['screen-home', 'screen-main', 'screen-final'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function startCreate() { if(validateName()) { mode = 'create'; showScreen('screen-main'); renderStep(); } }

        function renderStep() {
            const data = readyQuestions[currentIndex];
            document.getElementById('progress-text').innerText = `Step: ${currentIndex + 1}/10`;
            document.getElementById('question-area').innerHTML = `<div class="q-box"><div class="q-front">${data.q}</div></div>`;
            let optsHtml = "";
            data.opts.forEach((o, i) => { 
                optsHtml += `<div class="opt-cyber-btn" id="opt-${i}" style="animation-delay: ${i*0.1}s" onclick="selectOpt(${i})">${o}</div>`; 
            });
            document.getElementById('options-container').innerHTML = optsHtml;
            document.getElementById('action-btn-area').innerHTML = generateUiverseBtn("পরবর্তী", "handleNext()");
            selectedAns = null;
        }

        function selectOpt(idx) {
            document.querySelectorAll('.opt-cyber-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById(`opt-${idx}`).classList.add('selected');
            selectedAns = idx;
        }

        function handleNext() {
            if(selectedAns === null) return;
            if(mode === 'create') {
                quizData.push({ q: readyQuestions[currentIndex].q, opts: readyQuestions[currentIndex].opts, ans: selectedAns });
                if(currentIndex < 9) { currentIndex++; renderStep(); } else { saveQuiz(); }
            } else {
                if(selectedAns === quizData[currentIndex].ans) score++;
                if(currentIndex < quizData.length - 1) { currentIndex++; renderPlayStep(); } else { showFinalResult(); }
            }
        }

        function saveQuiz() {
            const id = "rakib" + Math.floor(Math.random() * 900000);
            db.ref('quizzes/' + id).set({ creator: userName, questions: quizData }).then(() => {
                showScreen('screen-final');
                const link = window.location.origin + window.location.pathname + "?id=" + id;
                document.getElementById('final-body').innerHTML = `
                    <h2 style="text-align:center; color:var(--accent);">Ready! 🚀</h2>
                    <div class="share-box">${link}</div>
                    <div style="display:flex; justify-content:center;">${generateUiverseBtn("লিঙ্ক কপি", `copyLink('${link}')`)}</div>
                `;
            });
        }

        function startQuiz(id) {
            if(validateName()) {
                db.ref('quizzes/' + id).once('value', snap => {
                    if(snap.exists()) { quizData = snap.val().questions; showScreen('screen-main'); mode = 'play'; renderPlayStep(); }
                });
            }
        }

        function renderPlayStep() {
            const data = quizData[currentIndex];
            document.getElementById('progress-text').innerText = `প্রশ্ন: ${currentIndex + 1}/${quizData.length}`;
            document.getElementById('question-area').innerHTML = `<div class="q-box"><div class="q-front">${data.q}</div></div>`;
            let optsHtml = "";
            data.opts.forEach((o, i) => { 
                optsHtml += `<div class="opt-cyber-btn" id="opt-${i}" style="animation-delay: ${i*0.1}s" onclick="selectOpt(${i})">${o}</div>`; 
            });
            document.getElementById('options-container').innerHTML = optsHtml;
            document.getElementById('action-btn-area').innerHTML = generateUiverseBtn("সাবমিট", "handleNext()");
            selectedAns = null;
        }

        function typeWriter(text, element) {
            let i = 0; element.innerHTML = "";
            function type() { if (i < text.length) { element.innerHTML += text.charAt(i); i++; setTimeout(type, 50); } }
            type();
        }

        function showFinalResult() {
            showScreen('screen-final');
            document.getElementById('final-body').innerHTML = `
                <div style="text-align:center;">
                    <h2 style="color:var(--yellow-400);">Score: ${score}/${quizData.length}</h2>
                    <h3 style="color:var(--accent);">সালামি: ৳${score * 100}</h3>
                </div>
                <div class="card"><div class="card__content">
                    <p class="text-body">${userName}, ঈদ মোবারক! সঠিক উত্তর দিয়ে সালামি জিতে নিলে!</p>
                    <svg class="sunsetsvg" version="1.0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1312 876">
                        <defs><linearGradient id="MyGradient" gradientTransform="rotate(90)"><stop offset="5%" stop-color="#ff632a"></stop><stop offset="95%" stop-color="#ffd900"></stop></linearGradient></defs>
                        <g transform="translate(0,876) scale(0.1,-0.1)"><path id="sun" d="M6370 3905 c-52 -7 -135 -25 -184 -40 -88 -25 -236 -83 -236 -91 0 -2 276 -4 613 -4 l612 1 -38 20 c-54 28 -229 85 -322 104 -111 23 -327 28 -445 10z"></path></g>
                    </svg>
                </div></div>
                <p style="text-align:center; color:rgba(255,255,255,0.6); font-size:0.9rem; padding: 0 10px;">
                    আপনিও কি চান আপনার বন্ধুরা আপনাকে কত চেনে তা জানতে? তাহলে আপনার বন্ধুদেরকেও বলুন তাদের নামে কুইজ তৈরি করতে! নিচের বাটনে ক্লিক করে হোমে ফিরুন।
                </p>
                <div style="display:flex; justify-content:center; margin-top:10px;">${generateUiverseBtn("হোমে ফিরুন", "location.href=window.location.pathname")}</div>
            `;
        }

        function copyLink(txt) {
            navigator.clipboard.writeText(txt).then(() => {
                const toast = document.getElementById('custom-toast');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            });
        }

        init();
    </script>
</body>
</html>
