        .premium-eid-wish .part-3 {
            font-family: 'Playfair Display', serif;

            font-weight: 500;
            font-size: 1.4rem;

        /* --- TV Styles --- */
        .main_wrapper { display: flex; align-items: center; justify-content: center; width: 100%; height: auto; margin: 15px 0; scale: 1.1; }

        .a2 { position: relative; top: -210%; left: -10%; width: 12em; height: 4em; border-radius: 50px; background-image: linear-gradient(#171717, #171717, #353535, #353535, #171717); clip-path: polygon(47% 0, 47% 0, 34% 34%, 54% 25%, 32% 100%, 29% 96%, 49% 32%, 30% 38%); transform: rotate(-8deg); }
        .tv { width: 20em; height: 11em; margin-top: 3em; border-radius: 15px; background-color: #d36604; display: flex; justify-content: center; border: 2px solid #1d0e01; box-shadow: inset 0.2em 0.2em #e69635; position: relative; }
        .screen { width: 13.5em; height: 9.5em; border: 2px solid #1d0e01; background: #000; border-radius: 10px; z-index: 99; display: flex; align-items: center; justify-content: center; padding: 12px; margin-top: 0.6em; }
        .notfound_text { font-size: 0.75em; color: #ffcc00; font-weight: bold; text-align: center; line-height: 1.3; font-family: 'Hind Siliguri'; }
        .buttons_div { width: 4.5em; align-self: center; height: 9.5em; background-color: #e69635; border: 2px solid #1d0e01; padding: 0.6em; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-direction: column; row-gap: 0.85em; margin-top: 0.6em; }
        .b1, .b2 { width: 1.8em; height: 1.8em; border-radius: 50%; background-color: #7f5934; border: 2px solid black; position: relative; }
        .speakers { display: flex; flex-direction: column; row-gap: 0.6em; }

        .bottom { width: 100%; display: flex; justify-content: center; gap: 11em; margin-top: -5px; }
        .base1, .base2 { height: 1.2em; width: 2.5em; border: 2px solid #171717; background-color: #4d4d4d; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .opt-cyber-btn.selected { background: rgba(172, 247, 255, 0.4); }

        .name-input { width: 100%; padding: 15px; border-radius: 12px; background: rgba(255,255,255,0.05); border: 2px solid var(--accent); color: #fff; font-size: 1.2rem; text-align: center; margin-bottom: 30px; }
        .q-box { width: 100%; margin-bottom: 25px; }

        .button > div > div { position: relative; border-radius: calc(1rem - 2px); background-color: var(--stone-800); overflow: hidden; padding: 0.8rem 1.8rem; }
        
        .hidden { display: none; }
        .share-box { background: rgba(255,255,255,0.08); padding: 15px; border-radius: 12px; border: 1.5px dashed var(--accent); margin: 20px 0; color: #acf7ff; text-align: center; font-size: 0.8rem; word-break: break-all; }

        .card {

        .imge .UserName {

            font-weight: 500;
            font-size: 1.4rem; /* Bigger name */

            margin: 0;

            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5); /* Text shadow for better readability */

        .imge .Id {
            font-family: sans-serif; /* Keep simple for ID */

            font-size: 10px;
            font-weight: bold;

            height: 125px;
            border-radius: 10px; /* More rounded corners */
            padding: 12px;
            font-family: 'Playfair Display', serif; /* Premium Font */
            font-style: italic;
            font-size: 11px;
            color: #eee; /* Light gray color for text */
            line-height: 1.5; /* Better line spacing */
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.03); /* Subtle border */
        }
        .Description strong {
            color: #fff; /* White for strong labels */
            font-weight: bold;
        }
        .social-media {
            margin-top: 15px; /* Increased top margin */
            padding-top: 10px;
            display: flex;
            justify-content: center; /* Center icons */
            gap: 15px; /* Space between icons */
        }
        .social-media:before {
            display: none; /* Removed the line separator */
        }
        .social-media a {
            text-decoration: none;
            color: var(--gold); /* Default color for icons */
            transition: color 0.3s ease; /* Smooth transition on hover */
        }
        .social-media a:hover {
            color: #fff; /* White color on hover */
        }
        .social-media a svg {
            width: 22px; /* Adjusted icon size */
            height: 22px;
            fill: currentColor;
            transform: none; /* Reset transformation */

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBTKGsT5CzPBbEGmqHfvkGPDHfIa8c6fQs",
            authDomain: "eid-salami-quiz.firebaseapp.com",
            projectId: "eid-salami-quiz",
            storageBucket: "eid-salami-quiz.firebasestorage.app",
            messagingSenderId: "415072344103",
            appId: "1:415072344103:web:25ab5babeb023c89a11602",
            databaseURL: "https://eid-salami-quiz-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let userName = "বন্ধু";
        let quizData = [];
        let currentIndex = 0;
        let selectedAns = null;
        let score = 0;
        let mode = 'play';

        const readyQuestions = [
            { q: "আমার প্রিয় খাবার কোনটি?", opts: ["বিরিয়ানি", "কাচ্চি", "ফুচকা", "বার্গার"] },

            { q: "আমার প্রিয় ঋতু কোনটি?", opts: ["শীত", "বর্ষা", "বসন্ত", "শরৎ"] },
            { q: "চা নাকি কফি?", opts: ["দুধ চা", "রঙ চা", "কফি", "কোক"] },
            { q: "আমার প্রিয় রঙ কোনটি?", opts: ["কালো", "নীল", "সাদা", "লাল"] },

            { q: "আমি রাত জাগি নাকি সকালে উঠি?", opts: ["রাত জাগা পাখি", "খুব ভোরে উঠি", "ঠিক নেই", "সারাদিন ঘুমাই"] },
            { q: "প্রিয় খেলা কোনটি?", opts: ["PUBG/FF", "Cricket", "Football", "Ludo"] },
            { q: "আমি কি কার্টুন দেখি?", opts: ["হ্যাঁ অনেক", "মাঝেমাঝে", "একদম না", "আগে দেখতাম"] },
            { q: "আমাকে তোমার কেমন মনে হয়?", opts: ["খুব ভালো", "রাগী", "রহস্যময়", "পাগল"] }
        ];

        function init() {
            const params = new URLSearchParams(window.location.search);
            const quizId = params.get('id');
            const homeBtns = document.getElementById('home-btns');
            if(quizId) homeBtns.innerHTML = generateUiverseBtn("কুইজ খেলুন", `startQuiz('${quizId}')`);
            else homeBtns.innerHTML = generateUiverseBtn("কুইজ তৈরি করো", "startCreate()");
        }

        function generateUiverseBtn(text, clickFn) {
            return `<button class="button" onclick="${clickFn}"><div><div><div>${text}</div></div></div></button>`;
        }

        function validateName() {
            const val = document.getElementById('user-name').value.trim();
            if(val) { userName = val; return true; }
            alert("নাম লিখুন!"); return false;
        }

        function showScreen(id) {
            ['screen-home', 'screen-main', 'screen-final'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function startCreate() { if(validateName()) { mode = 'create'; showScreen('screen-main'); renderStep(); } }

        function renderStep() {
            const data = readyQuestions[currentIndex];
            document.getElementById('progress-text').innerText = `Step: ${currentIndex + 1}/10`;
            document.getElementById('question-area').innerHTML = `<div class="q-box"><div class="q-front">${data.q}</div></div>`;
            let optsHtml = "";
            data.opts.forEach((o, i) => { 
                optsHtml += `<div class="opt-cyber-btn" id="opt-${i}" style="animation-delay: ${i*0.1}s" onclick="selectOpt(${i})">${o}</div>`; 
            });
            document.getElementById('options-container').innerHTML = optsHtml;
            document.getElementById('action-btn-area').innerHTML = generateUiverseBtn("পরবর্তী", "handleNext()");
            selectedAns = null;
        }

        function selectOpt(idx) {
            document.querySelectorAll('.opt-cyber-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById(`opt-${idx}`).classList.add('selected');
            selectedAns = idx;
        }

        function handleNext() {
            if(selectedAns === null) return;
            if(mode === 'create') {
                quizData.push({ q: readyQuestions[currentIndex].q, opts: readyQuestions[currentIndex].opts, ans: selectedAns });
                if(currentIndex < 9) { currentIndex++; renderStep(); } else { saveQuiz(); }
            } else {
                if(selectedAns === quizData[currentIndex].ans) score++;
                if(currentIndex < quizData.length - 1) { currentIndex++; renderPlayStep(); } else { showFinalResult(); }
            }
        }

        function saveQuiz() {
            const cleanName = userName.toLowerCase().replace(/\s+/g, '');
            const id = cleanName + Math.floor(Math.random() * 9000);
            db.ref('quizzes/' + id).set({ creator: userName, questions: quizData }).then(() => {
                showScreen('screen-final');
                const link = window.location.origin + window.location.pathname + "?id=" + id;
                document.getElementById('final-body').innerHTML = `
                    <h2 style="text-align:center; color:var(--accent); margin-top:0;">Ready! 🚀</h2>

                    <div style="display:flex; justify-content:center;">${generateUiverseBtn("লিঙ্ক কপি", `copyLink('${link}')`)}</div>
                    
                    <div class="card">
                      <div class="imge">
                        <div class="Usericon"></div>
                        <p class="UserName">Rakib</p>
                        <p class="Id">@MdRakib94110724</p>
                      </div>
                      <div class="Description">
                        <strong>Md Rakib</strong><br>
                        Lives in Melbourne, Australia.<br>
                        Cyber Security Student (2nd Sem).<br>
                        Victoria University.
                      </div>
                      <div class="social-media">
                        <a href="https://www.linkedin.com/in/md-rakib-8568bb265/" target="_blank">
                          <svg viewBox="0 0 448 512" xmlns="http://www.w3.org/2000/svg"><path d="M100.28 448H7.4V148.9h92.88zM53.79 108.1C24.09 108.1 0 83.5 0 53.8a53.79 53.79 0 0 1 107.58 0c0 29.7-24.1 54.3-53.79 54.3zM447.9 448h-92.68V302.4c0-34.7-.7-79.2-48.29-79.2-48.29 0-55.69 37.7-55.69 76.7V448h-92.78V148.9h89.08v40.8h1.3c12.4-23.5 42.69-48.3 87.88-48.3 94 0 111.28 61.9 111.28 142.3V448z"></path></svg>
                        </a>
                        <a href="https://www.instagram.com/rakib.au25/" target="_blank">
                          <svg viewBox="0 0 448 512" xmlns="http://www.w3.org/2000/svg"><path d="M224.1 141c-63.6 0-114.9 51.3-114.9 114.9s51.3 114.9 114.9 114.9S339 319.5 339 255.9 287.7 141 224.1 141zm0 189.6c-41.1 0-74.7-33.5-74.7-74.7s33.5-74.7 74.7-74.7 74.7 33.5 74.7 74.7-33.6 74.7-74.7 74.7zm146.4-194.3c0 14.9-12 26.8-26.8 26.8-14.9 0-26.8-12-26.8-26.8s12-26.8 26.8-26.8 26.8 12 26.8 26.8zm76.1 27.2c-1.7-35.9-9.9-67.7-36.2-93.9-26.2-26.2-58-34.4-93.9-36.2-37-2.1-147.9-2.1-184.9 0-35.8 1.7-67.6 9.9-93.9 36.1s-34.4 58-36.2 93.9c-2.1 37-2.1 147.9 0 184.9 1.7 35.9 9.9 67.7 36.2 93.9s58 34.4 93.9 36.2c37 2.1 147.9 2.1 184.9 0 35.9-1.7 67.7-9.9 93.9-36.2 26.2-26.2 34.4-58 36.2-93.9 2.1-37 2.1-147.8 0-184.8zM398.8 388c-7.8 19.6-22.9 34.7-42.6 42.6-29.5 11.7-99.5 9-132.1 9s-102.7 2.6-132.1-9c-19.6-7.8-34.7-22.9-42.6-42.6-11.7-29.5-9-99.5-9-132.1s-2.6-102.7 9-132.1c7.8-19.6 22.9-34.7 42.6-42.6 29.5-11.7 99.5-9 132.1-9s102.7-2.6 132.1 9c19.6 7.8 34.7 22.9 42.6 42.6 11.7 29.5 9 99.5 9 132.1s2.7 102.7-9 132.1z"></path></svg>
                        </a>
                        <a href="https://www.facebook.com/mdrakib11005511" target="_blank">
                          <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M504 256C504 119 393 8 256 8S8 119 8 256c0 123.78 90.69 226.38 209.25 245V327.69h-63V256h63v-54.64c0-62.15 37-96.48 93.67-96.48 27.14 0 55.52 4.84 55.52 4.84v61h-31.28c-30.8 0-40.41 19.12-40.41 38.73V256h68.78l-11 71.69h-57.78V501C413.31 482.38 504 379.78 504 256z"></path></svg>
                        </a>
                        <a href="https://x.com/MdRakib94110724" target="_blank">
                          <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M389.2 48h70.6L305.6 224.2 487 464H345L233.7 318.6 106.5 464H35.8L200.7 275.5 26.8 48H172.4L272.9 180.9 389.2 48zM364.4 421.8h39.1L151.1 88h-42L364.4 421.8z"></path></svg>
                        </a>
                      </div>
                    </div>
                `;
            });
        }

        function startQuiz(id) {
            if(validateName()) {
                db.ref('quizzes/' + id).once('value', snap => {
                    if(snap.exists()) { quizData = snap.val().questions; showScreen('screen-main'); mode = 'play'; renderPlayStep(); }
                });
            }
        }

        function renderPlayStep() {
            const data = quizData[currentIndex];
            document.getElementById('progress-text').innerText = `প্রশ্ন: ${currentIndex + 1}/${quizData.length}`;
            document.getElementById('question-area').innerHTML = `<div class="q-box"><div class="q-front">${data.q}</div></div>`;
            let optsHtml = "";
            data.opts.forEach((o, i) => { 
                optsHtml += `<div class="opt-cyber-btn" id="opt-${i}" style="animation-delay: ${i*0.1}s" onclick="selectOpt(${i})">${o}</div>`; 
            });
            document.getElementById('options-container').innerHTML = optsHtml;
            document.getElementById('action-btn-area').innerHTML = generateUiverseBtn("সাবমিট", "handleNext()");
            selectedAns = null;
        }

        function typeWriter(text, element) {
            let i = 0; element.innerHTML = "";
            function type() { if (i < text.length) { element.innerHTML += text.charAt(i); i++; setTimeout(type, 60); } }
            type();
        }

        function showFinalResult() {
            showScreen('screen-final');
            const randomExtra = Math.floor(Math.random() * 11);
            const totalSalami = (score * 10) + randomExtra;
            const wishes = [
                `হেই ${userName}, ঈদ মোবারক! তুমি ${score}টি সঠিক উত্তর দিয়ে আমার মন জয় করেছো। তাই উপহার হিসেবে ৳${totalSalami} সালামি তোমার জন্য বরাদ্দ করলাম!`,
                `দারুণ খেলেছো ${userName}! আমার সম্পর্কে তোমার জ্ঞান দেখে আমি অবাক। তোমার এই চেষ্টার পুরস্কার হিসেবে ৳${totalSalami} সালামি দিচ্ছি, আনন্দ করো!`,
                `ঈদ মানেই আনন্দ, আর তোমার সঠিক উত্তরে সেই আনন্দ দ্বিগুণ হয়ে গেল। ${userName}, তোমার সালামি ৳${totalSalami} দ্রুত বুঝে নাও এবং খুব ভালো থেকো।`,
                `${userName}, তুমি তো দেখছি আমার অন্তর্যামী! ${score}টি উত্তর সঠিক হয়েছে। তোমার গিফট হিসেবে এই ৳${totalSalami} সালামি রাখা আছে, ঈদ কাটুক হাসিখুশিতে।`,
                `অভিনন্দন ${userName}! আমার পছন্দের সব বিষয় তুমি জানো দেখে খুব ভালো লাগলো। তোমার ঈদি বা সালামি হলো ৳${totalSalami}, এবারের ঈদ হোক স্পেশাল!`,
                `প্রিয় ${userName}, তোমার মেধা আর আমার প্রতি ভালোবাসা দেখে মুগ্ধ হলাম। এই নাও তোমার প্রাপ্য ৳${totalSalami} সালামি। অনেক অনেক দোয়া আর ভালোবাসা রইলো।`,
                `কুইজ তো ফাটিয়ে দিয়েছো ${userName}! ${score}টি উত্তর সঠিক করে তুমি প্রমাণ করলে আমাদের বন্ধুত্ব কতটা গভীর। তোমার জন্য ৳${totalSalami} সালামি রেডী!`,
                `${userName}, তোমার মত বন্ধু পাওয়া ভাগ্যের ব্যাপার। আমার খুটিনাটি সব তোমার নখদর্পণে! সালামি হিসেবে এই ৳${totalSalami} টাকা তোমার পকেটে নিয়ে নাও দ্রুত।`,
                `ঈদ মোবারক ${userName}! তোমার স্কোরের জন্য অনেক অভিনন্দন। পুরস্কার হিসেবে আমার তরফ থেকে তোমার জন্য ৳${totalSalami} সালামি গিফট করলাম। দারুণ কাটুক ঈদ!`,
                `ওয়াও ${userName}! তুমি তো দেখি আমার সব গোপন খবর জানো! এতগুলো সঠিক উত্তরের জন্য ৳${totalSalami} সালামি তোমার প্রাপ্য। এনজয় করো এবারের ঈদ!`,
                `${userName}, তোমার উত্তরগুলো দেখে বুঝলাম তুমি আমায় কতটা গুরুত্ব দাও। এই ভালোবাসার প্রতিদান হিসেবে ৳${totalSalami} সালামি তোমার জন্য রাখা আছে।`,
                `ঈদ উল আযহার অনেক শুভেচ্ছা ${userName}! ${score}টি সঠিক উত্তর মানেই তুমি সুপারস্টার। তোমার উপহার হিসেবে ৳${totalSalami} সালামি পাঠালাম, খুশি থেকো সব সময়।`,
                `চমৎকার পারফরম্যান্স ${userName}! আমার জীবনের ছোট ছোট বিষয়গুলোও তোমার মনে আছে দেখে খুব ভালো লাগলো। নাও তোমার ৳${totalSalami} সালামি নিয়ে নাও।`,
                `${userName}, তুমি যে এত ভালো উত্তর দেবে ভাবিনি! তোমার জয়ের স্মারক হিসেবে ৳${totalSalami} সালামি রইলো। অনেক হাসি আর খুশিতে ভরে উঠুক তোমার দিন।`,
                `প্রিয় বন্ধু ${userName}, তোমার তীক্ষ্ণ বুদ্ধির জয় হোক! আমার সম্পর্কে এত নিখুঁত জানার জন্য এই ৳${totalSalami} সালামি ছোট একটি উপহার। ঈদ মোবারক!`
            ];
            const finalWish = wishes[Math.floor(Math.random() * wishes.length)];
            document.getElementById('final-body').innerHTML = `
                <div style="text-align:center;"><h2 style="color:var(--yellow-400); margin-bottom:5px;">Score: ${score}/${quizData.length}</h2></div>
                <div class="main_wrapper">
                    <div class="main">
                        <div class="antenna"><div class="antenna_shadow"></div><div class="a1"></div><div class="a2"></div></div>
                        <div class="tv">
                            <div class="display_div"><div class="screen"><span class="notfound_text" id="type-text"></span></div></div>
                            <div class="buttons_div">
                                <div class="b1"></div><div class="b2"></div>
                                <div class="speakers"><div class="g"></div><div class="g"></div><div class="g"></div></div>
                            </div>
                        </div>
                        <div class="bottom"><div class="base1"></div><div class="base2"></div></div>
                    </div>
                </div>
                <p style="text-align:center; color:rgba(255,255,255,0.6); font-size:0.85rem; padding: 0 15px; margin-top:20px;">আপনিও কি চান আপনার বন্ধুরা আপনাকে কত চেনে তা জানতে? তাহলে বন্ধুদেরকেও বলুন কুইজ তৈরি করতে!</p>
                <div style="display:flex; justify-content:center; margin-top:10px;">${generateUiverseBtn("হোমে ফিরুন", "location.href=window.location.pathname")}</div>
            `;
            setTimeout(() => typeWriter(finalWish, document.getElementById('type-text')), 500);
        }

        function copyLink(txt) {
            navigator.clipboard.writeText(txt).then(() => {
                const toast = document.getElementById('custom-toast');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            });
        }
        init();
    </script>
</body>
</html>
