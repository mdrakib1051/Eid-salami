<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eid Salami Quiz Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #09090b;
            --accent: #acf7ff;
            --stone-800: #292524;
            --yellow-400: #facc15;
            --cyber-blue: #acf7ff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Hind Siliguri', sans-serif;
            margin: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        .app-container {
            width: 95%; max-width: 420px; height: 92vh;
            display: flex; flex-direction: column;
            background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, rgba(0,0,0,0) 100%);
            border-radius: 30px; padding: 25px; position: relative;
            border: 1px solid rgba(172, 247, 255, 0.1);
        }

        /* --- Animations --- */
        @keyframes star-rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Name Input Style --- */
        .name-input {
            width: 100%; padding: 15px; border-radius: 12px;
            background: rgba(255,255,255,0.05); border: 2px solid var(--accent);
            color: #fff; font-size: 1.2rem; text-align: center;
            margin-bottom: 30px; font-family: 'Hind Siliguri';
        }

        /* --- Question Box (Clean Gradient) --- */
        .q-box { 
            width: 100%; margin-bottom: 25px; animation: slideUp 0.5s ease;
        }
        .q-front {
            padding: 22px; border-radius: 15px; font-size: 1.5rem; font-weight: 700;
            background: linear-gradient(135deg, #f27121, #e94057, #8a2387);
            box-shadow: 0 10px 25px rgba(233, 64, 87, 0.3); text-align: center;
        }

        /* --- Option Button (Broken Corner) --- */
        .opt-cyber-btn {
            min-height: 58px; width: 100%; display: flex; align-items: center;
            padding-left: 25px; position: relative; cursor: pointer;
            border: 2px solid var(--cyber-blue); color: #ffffff;
            font-size: 1.2rem; font-weight: 600; margin-bottom: 12px;
            background: linear-gradient(90deg, rgba(110, 239, 255, 0.2) 0%, rgba(106, 224, 255, 0.05) 100%);
            transition: 0.3s; opacity: 0; animation: slideUp 0.4s forwards;
        }
        .opt-cyber-btn:after {
            content: ""; position: absolute; left: -2px; bottom: -2px;
            border-top: 14px solid transparent; border-left: 14px solid #fffcf7;
        }
        .opt-cyber-btn.selected { background: rgba(172, 247, 255, 0.3); border-color: #fff; }

        /* --- Spinning Button Container --- */
        .btn-wrapper {
            position: relative; display: flex; justify-content: center;
            margin-top: 40px; padding-bottom: 20px;
        }

        .spinning-bg {
            position: absolute; z-index: 0; height: 180px; aspect-ratio: 1;
            background: white; top: 50%; left: 50%; transform: translate(-50%, -50%);
            clip-path: polygon(100% 50%, 91.48% 56.57%, 97.55% 65.45%, 87.42% 69.07%, 90.45% 79.39%, 79.7% 79.7%, 79.39% 90.45%, 69.07% 87.42%, 65.45% 97.55%, 56.57% 91.48%, 50% 100%, 43.43% 91.48%, 34.55% 97.55%, 30.93% 87.42%, 20.61% 90.45%, 20.3% 79.7%, 9.55% 79.39%, 12.58% 69.07%, 2.45% 65.45%, 8.52% 56.57%, 0% 50%, 8.52% 43.43%, 2.45% 34.55%, 12.58% 30.93%, 9.55% 20.61%, 20.3% 20.3%, 20.61% 9.55%, 30.93% 12.58%, 34.55% 2.45%, 43.43% 8.52%, 50% 0%, 56.57% 8.52%, 65.45% 2.45%, 69.07% 12.58%, 79.39% 9.55%, 79.7% 20.3%, 90.45% 20.61%, 87.42% 30.93%, 97.55% 34.55%, 91.48% 43.43%);
            animation: star-rotate 6s linear infinite; opacity: 0.12; pointer-events: none;
        }

        /* --- Premium Button --- */
        .button { cursor: pointer; position: relative; border: none; background: none; z-index: 2; }
        .button > div { padding: 4px; border-radius: 1rem; background-color: var(--yellow-400); transform: translate(-4px, -4px); transition: 0.2s; box-shadow: 4px 4px 0 0 var(--yellow-400), 0 0 0 2px var(--stone-800); }
        .button:active > div { transform: translate(0, 0); box-shadow: none; }
        .button > div > div { background-color: var(--stone-800); border-radius: calc(1rem - 2px); padding: 14px 40px; color: #fff; font-weight: 800; font-size: 1.3rem; }

        /* --- Wish Card --- */
        .card {
            width: 100%; max-width: 300px; height: 320px; padding: 5px; margin: 15px auto;
            background-image: linear-gradient(#ca1eb3, #FD2E24, #FFD701 70%);
            border-radius: 15px; animation: slideUp 0.8s ease;
        }
        .card__content {
            background-color: rgba(15, 15, 15, 0.98); backdrop-filter: blur(20px);
            width: 100%; height: 100%; padding: 20px; border-radius: 11px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .text-title { color: #fff; font-size: 1.7rem; font-weight: 800; margin-bottom: 10px; }
        .text-body { color: #ffcc00; text-align: center; font-size: 1.15rem; line-height: 1.6; font-weight: 600; min-height: 120px; }

        .hidden { display: none; }
        .share-box { background: rgba(255,255,255,0.08); padding: 15px; border-radius: 12px; word-break: break-all; border: 1.5px dashed var(--accent); margin: 20px 0; color: #acf7ff; text-align: center; }
        #custom-toast { position: fixed; top: 30px; background: #fff; padding: 12px 30px; border-radius: 50px; color: #000; font-weight: 800; z-index: 9999; transform: translateY(-150px); transition: 0.5s; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #custom-toast.show { transform: translateY(0); }
    </style>
</head>
<body>

    <div id="custom-toast">Link Copied! ✅</div>

    <div class="app-container" id="app">
        <div id="screen-home" style="text-align: center; margin-top: 40px;">
            <h1 style="color:var(--accent); font-size: 3rem; margin-bottom: 10px;">Eid Salami🌙</h1>
            <p style="opacity:0.7; margin-bottom: 40px;">সালামি জিততে কুইজটি খেলুন!</p>
            
            <input type="text" id="user-name" class="name-input" placeholder="আপনার নাম লিখুন...">
            
            <div id="home-btns"></div>
        </div>

        <div id="screen-main" class="hidden">
            <div id="progress-text" style="color:var(--accent); font-size:1.1rem; margin-bottom:12px; font-weight: bold; text-align: center;"></div>
            <div id="question-area"></div>
            <div id="options-container"></div>
            <div id="action-btn-area" class="btn-wrapper"></div>
        </div>

        <div id="screen-final" class="hidden">
            <div id="final-body"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBTKGsT5CzPBbEGmqHfvkGPDHfIa8c6fQs",
            authDomain: "eid-salami-quiz.firebaseapp.com",
            projectId: "eid-salami-quiz",
            storageBucket: "eid-salami-quiz.firebasestorage.app",
            messagingSenderId: "415072344103",
            appId: "1:415072344103:web:25ab5babeb023c89a11602",
            databaseURL: "https://eid-salami-quiz-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const wishes = [
            "দোস্ত {name}, তুই সব সময় পাশে থাকিস এটাই বড় পাওয়া। ঈদ মোবারক!",
            "{name}, তোর মত বন্ধু পাওয়া ভাগ্যের ব্যাপার। পাগলামি চলুক সারা জীবন!",
            "সঠিক উত্তর দিয়ে প্রমান করলি তুই {name} আমাকে কতটা চিনিস! ভালোবাসা রইল।",
            "সালামি তো বাহানা, আসলে তোকে {name} উইশ করাই ছিল মেইন প্ল্যান।",
            "{name}, তোর জীবনটা যেন এই রঙের মতই রঙিন হয়। সব সময় হাসিখুশি থাকিস!"
        ];

        const readyQuestions = [
            { q: "আমার প্রিয় খাবার কোনটি?", opts: ["বিরিয়ানি", "কাচ্চি", "ফুচকা", "বার্গার"] },
            { q: "আমি ফ্রি সময়ে কি করি?", opts: ["মুভি দেখি", "কোডিং করি", "ঘুমাই", "ঘুরতে যাই"] },
            { q: "আমার প্রিয় ঋতু কোনটি?", opts: ["শীত", "বর্ষা", "বসন্ত", "শরৎ"] },
            { q: "চা নাকি কফি?", opts: ["দুধ চা", "রঙ চা", "কফি", "কোক"] },
            { q: "আমার প্রিয় রঙ কোনটি?", opts: ["কালো", "নীল", "সাদা", "লাল"] },
            { q: "ড্রিম ট্যুর কোথায়?", opts: ["সাজেক", "কক্সবাজার", "সিলেট", "বান্দরবান"] },
            { q: "আমি রাত জাগি নাকি সকালে উঠি?", opts: ["রাত জাগা পাখি", "খুব ভোরে উঠি", "ঠিক নেই", "সারাদিন ঘুমাই"] },
            { q: "প্রিয় খেলা কোনটি?", opts: ["PUBG/FF", "Cricket", "Football", "Ludo"] },
            { q: "আমি কি কার্টুন দেখি?", opts: ["হ্যাঁ অনেক", "মাঝেমাঝে", "একদম না", "আগে দেখতাম"] },
            { q: "আমাকে তোমার কেমন মনে হয়?", opts: ["খুব ভালো", "রাগী", "রহস্যময়", "পাগল"] }
        ];

        let quizData = [];
        let currentIndex = 0;
        let selectedAns = null;
        let score = 0;
        let mode = 'play';
        let userName = "বন্ধু";

        function init() {
            const params = new URLSearchParams(window.location.search);
            const quizId = params.get('id');
            const homeBtns = document.getElementById('home-btns');
            if(quizId) homeBtns.innerHTML = generateStoneBtn("কুইজ খেলুন", `startQuiz('${quizId}')`);
            else homeBtns.innerHTML = generateStoneBtn("কুইজ তৈরি করো", "startCreate()");
        }

        function generateStoneBtn(text, clickFn) {
            return `
                <div class="spinning-bg"></div>
                <button class="button" onclick="${clickFn}"><div><div><div>${text}</div></div></div></button>
            `;
        }

        function showScreen(id) {
            ['screen-home', 'screen-main', 'screen-final'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function validateName() {
            const val = document.getElementById('user-name').value.trim();
            if(val) { userName = val; return true; }
            alert("দয়া করে আপনার নাম লিখুন!"); return false;
        }

        function startCreate() { 
            if(!validateName()) return;
            mode = 'create'; showScreen('screen-main'); renderStep(); 
        }

        function renderStep() {
            const data = readyQuestions[currentIndex];
            document.getElementById('progress-text').innerText = `ধাপ: ${currentIndex + 1}/10`;
            document.getElementById('question-area').innerHTML = `<div class="q-box"><div class="q-front">${data.q}</div></div>`;
            
            let optsHtml = "";
            data.opts.forEach((o, i) => { 
                optsHtml += `<div class="opt-cyber-btn" id="opt-${i}" style="animation-delay: ${0.1 + (i*0.1)}s" onclick="selectOpt(${i})">${o}</div>`; 
            });
            document.getElementById('options-container').innerHTML = optsHtml;
            document.getElementById('action-btn-area').innerHTML = generateStoneBtn("পরবর্তী", "handleNext()");
            selectedAns = null;
        }

        function selectOpt(idx) {
            document.querySelectorAll('.opt-cyber-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById(`opt-${idx}`).classList.add('selected');
            selectedAns = idx;
        }

        function handleNext() {
            if(selectedAns === null) return;
            if(mode === 'create') {
                quizData.push({ q: readyQuestions[currentIndex].q, opts: readyQuestions[currentIndex].opts, ans: selectedAns });
                if(currentIndex < 9) { currentIndex++; renderStep(); } else { saveQuiz(); }
            } else {
                if(selectedAns === quizData[currentIndex].ans) score++;
                if(currentIndex < quizData.length - 1) { currentIndex++; renderPlayStep(); } else { showFinalResult(); }
            }
        }

        function saveQuiz() {
            const id = "rakib" + Math.floor(Math.random() * 900000);
            db.ref('quizzes/' + id).set({ creator: userName, questions: quizData }).then(() => {
                showScreen('screen-final');
                const link = window.location.origin + window.location.pathname + "?id=" + id;
                document.getElementById('final-body').innerHTML = `
                    <h2 style="text-align:center; color:var(--accent); font-size: 2rem;">Ready ${userName}! 🚀</h2>
                    <div class="share-box">${link}</div>
                    <div style="display:flex; justify-content:center; margin-top:20px;">
                        ${generateStoneBtn("লিঙ্ক কপি করুন", `copyLink('${link}')`)}
                    </div>
                `;
            });
        }

        function startQuiz(id) {
            if(!validateName()) return;
            mode = 'play';
            db.ref('quizzes/' + id).once('value', snap => {
                if(snap.exists()) {
                    quizData = snap.val().questions;
                    showScreen('screen-main');
                    renderPlayStep();
                }
            });
        }

        function renderPlayStep() {
            const data = quizData[currentIndex];
            document.getElementById('progress-text').innerText = `প্রশ্ন: ${currentIndex + 1}/${quizData.length}`;
            document.getElementById('question-area').innerHTML = `<div class="q-box"><div class="q-front">${data.q}</div></div>`;
            
            let optsHtml = "";
            data.opts.forEach((o, i) => { 
                optsHtml += `<div class="opt-cyber-btn" id="opt-${i}" style="animation-delay: ${0.1 + (i*0.1)}s" onclick="selectOpt(${i})">${o}</div>`; 
            });
            document.getElementById('options-container').innerHTML = optsHtml;
            document.getElementById('action-btn-area').innerHTML = generateStoneBtn("সাবমিট", "handleNext()");
            selectedAns = null;
        }

        function typeWriter(text, element) {
            let i = 0; element.innerHTML = "";
            function type() { if (i < text.length) { element.innerHTML += text.charAt(i); i++; setTimeout(type, 50); } }
            type();
        }

        function showFinalResult() {
            showScreen('screen-final');
            let randomWish = wishes[Math.floor(Math.random() * wishes.length)];
            randomWish = randomWish.replace("{name}", userName);
            
            document.getElementById('final-body').innerHTML = `
                <div style="text-align:center; animation: slideUp 0.5s;">
                    <h2 style="color:var(--yellow-400); font-size: 1.5rem; margin-bottom:5px;">Result: ${score}/${quizData.length}</h2>
                    <h3 style="color:var(--accent); font-size:2.2rem; margin-top:0;">সালামি: ৳${score * 100}</h3>
                </div>
                <div class="card"><div class="card__content">
                    <p class="text-title">Eid Wish ✨</p>
                    <p class="text-body" id="wish-text"></p>
                </div></div>
                <div style="display:flex; justify-content:center; margin-top:20px;">
                    ${generateStoneBtn("হোমে ফিরুন", "location.href=window.location.pathname")}
                </div>
            `;
            setTimeout(() => typeWriter(randomWish, document.getElementById('wish-text')), 800);
        }

        function copyLink(txt) {
            navigator.clipboard.writeText(txt).then(() => {
                const toast = document.getElementById('custom-toast');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            });
        }

        init();
    </script>
</body>
</html>
