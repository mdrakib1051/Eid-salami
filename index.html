<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eid Salami Quiz | Rakib</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Rubik:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #09090b;
            --accent: #acf7ff;
            --stone-50: #fafaf9;
            --stone-800: #292524;
            --yellow-400: #facc15;
            --cyber-blue: #acf7ff;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Hind Siliguri', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        .app-container {
            width: 95%; max-width: 420px; height: 92vh;
            display: flex; flex-direction: column;
            background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, rgba(0,0,0,0) 100%);
            border-radius: 30px; padding: 25px; position: relative;
            border: 1px solid rgba(172, 247, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* TV & Animations as before */
        .main_wrapper { display: flex; align-items: center; justify-content: center; width: 100%; margin: 20px 0; transform: scale(1.15); }
        .main { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .antenna { width: 5em; height: 5em; border-radius: 50%; border: 2px solid black; background-color: #f27405; margin-bottom: -6em; z-index: -1; position: relative;}
        .tv { width: 20em; height: 11.5em; margin-top: 3em; border-radius: 15px; background-color: #d36604; display: flex; justify-content: center; border: 2px solid #1d0e01; position: relative; }
        .screen { width: 13.5em; height: 10em; border: 2px solid #1d0e01; background: #000; border-radius: 10px; z-index: 99; display: flex; align-items: center; justify-content: center; padding: 15px; margin-top: 0.6em; }
        .notfound_text { font-size: 1em; color: #ffcc00; font-weight: bold; text-align: center; }

        .name-input { width: 100%; padding: 18px; border-radius: 15px; background: var(--glass); border: 2px solid var(--accent); color: #fff; font-size: 1.2rem; text-align: center; margin-bottom: 35px; }
        .q-front { padding: 25px; border-radius: 20px; font-size: 1.6rem; font-weight: 700; background: linear-gradient(135deg, #f27121, #e94057, #8a2387); text-align: center; }

        .button { font-family: "Rubik", sans-serif; cursor: pointer; position: relative; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 1rem; color: var(--stone-50); background: none; border: none; margin-top: 25px; }
        .button > div { padding: 2px; border-radius: 1rem; background-color: var(--yellow-400); transform: translate(-4px, -4px); box-shadow: 2px 2px 0 0 var(--yellow-400), 0 0 0 2px var(--stone-800), 0 0 0 4px var(--stone-50); }
        .button > div > div { position: relative; border-radius: calc(1rem - 2px); background-color: var(--stone-800); padding: 0.8rem 2rem; }
        
        .opt-cyber-btn { min-height: 58px; width: 100%; display: flex; align-items: center; padding-left: 25px; cursor: pointer; border: 2px solid var(--cyber-blue); color: #fff; font-size: 1.2rem; margin-bottom: 15px; background: rgba(110, 239, 255, 0.05); border-radius: 12px; }
        .opt-cyber-btn.selected { background: rgba(172, 247, 255, 0.3); border-color: #fff; }

        .hidden { display: none; }
        .share-box { background: rgba(255,255,255,0.06); padding: 20px; border-radius: 15px; border: 1.5px dashed var(--accent); margin: 25px 0; color: #acf7ff; text-align: center; }
        #custom-toast { position: fixed; top: 30px; background: #fff; padding: 12px 30px; border-radius: 50px; color: #000; font-weight: 800; z-index: 9999; transform: translateY(-150px); transition: 0.5s; }
        #custom-toast.show { transform: translateY(0); }
    </style>
</head>
<body>

    <div id="custom-toast">Link Copied! ✅</div>

    <div class="app-container" id="app">
        <div id="screen-home" style="text-align: center; margin-top: 50px;">
            <h1 style="color:var(--accent); font-size: 3.2rem; margin-bottom: 20px;">Eid Salami🌙</h1>
            <input type="text" id="user-name" class="name-input" placeholder="আপনার নাম লিখুন...">
            <div id="home-btns"></div>
        </div>

        <div id="screen-main" class="hidden">
            <div id="progress-text" style="color:var(--accent); text-align: center; margin-bottom: 15px; font-weight: bold;"></div>
            <div id="question-area"></div>
            <div id="options-container"></div>
            <div id="action-btn-area" style="display: flex; justify-content: center;"></div>
        </div>

        <div id="screen-final" class="hidden">
            <div id="final-body"></div>
        </div>
    </div>

    <script>
        // Firebase Configuration (Same as yours)
        const firebaseConfig = {
            apiKey: "AIzaSyBTKGsT5CzPBbEGmqHfvkGPDHfIa8c6fQs",
            authDomain: "eid-salami-quiz.firebaseapp.com",
            projectId: "eid-salami-quiz",
            storageBucket: "eid-salami-quiz.firebasestorage.app",
            messagingSenderId: "415072344103",
            appId: "1:415072344103:web:25ab5babeb023c89a11602",
            databaseURL: "https://eid-salami-quiz-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- NEW AUDIO TRICK ---
        const audio = new Audio();
        audio.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"; // Temporary working test link
        // Replace with your specific direct MP3 link if you have one
        audio.loop = true;

        function startMusic() {
            // This MUST be called inside a click event to work on mobile browsers
            audio.play().catch(err => {
                console.log("Audio play failed, retrying on next click...");
            });
        }

        // Logic for Quiz (Same as before)
        let userName = "বন্ধু";
        let quizData = [];
        let currentIndex = 0;
        let selectedAns = null;
        let score = 0;
        let mode = 'play';

        const readyQuestions = [
            { q: "আমার প্রিয় খাবার কোনটি?", opts: ["বিরিয়ানি", "কাচ্চি", "ফুচকা", "বার্গার"] },
            { q: "আমি ফ্রি সময়ে কি করি?", opts: ["মুভি দেখি", "কোডিং করি", "ঘুমাই", "ঘুরতে যাই"] },
            { q: "আমার প্রিয় ঋতু কোনটি?", opts: ["শীত", "বর্ষা", "বসন্ত", "শরৎ"] },
            { q: "চা নাকি কফি?", opts: ["দুধ চা", "রঙ চা", "কফি", "কোক"] },
            { q: "আমার প্রিয় রঙ কোনটি?", opts: ["কালো", "নীল", "সাদা", "লাল"] },
            { q: "ড্রিম ট্যুর কোথায়?", opts: ["সাজেক", "কক্সবাজার", "সিলেট", "বান্দরবান"] },
            { q: "আমি রাত জাগি নাকি সকালে উঠি?", opts: ["রাত জাগা পাখি", "খুব ভোরে উঠি", "ঠিক নেই", "সারাদিন ঘুমাই"] },
            { q: "প্রিয় খেলা কোনটি?", opts: ["PUBG/FF", "Cricket", "Football", "Ludo"] },
            { q: "আমি কি কার্টুন দেখি?", opts: ["হ্যাঁ অনেক", "মাঝেমাঝে", "একদম না", "আগে দেখতাম"] },
            { q: "আমাকে তোমার কেমন মনে হয়?", opts: ["খুব ভালো", "রাগী", "রহস্যময়", "পাগল"] }
        ];

        function init() {
            const params = new URLSearchParams(window.location.search);
            const quizId = params.get('id');
            const homeBtns = document.getElementById('home-btns');
            if(quizId) homeBtns.innerHTML = generateUiverseBtn("কুইজ খেলুন", `startQuiz('${quizId}')`);
            else homeBtns.innerHTML = generateUiverseBtn("কুইজ তৈরি করো", "startCreate()");
        }

        function generateUiverseBtn(text, clickFn) {
            return `<button class="button" onclick="startMusic(); ${clickFn}"><div><div><div>${text}</div></div></div></button>`;
        }

        function validateName() {
            const val = document.getElementById('user-name').value.trim();
            if(val) { userName = val; return true; }
            alert("আপনার সুন্দর নামটি লিখুন!"); return false;
        }

        function showScreen(id) {
            ['screen-home', 'screen-main', 'screen-final'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function startCreate() { if(validateName()) { mode = 'create'; showScreen('screen-main'); renderStep(); } }

        function renderStep() {
            const data = readyQuestions[currentIndex];
            document.getElementById('progress-text').innerText = `ধাপ: ${currentIndex + 1} / 10`;
            document.getElementById('question-area').innerHTML = `<div class="q-box"><div class="q-front">${data.q}</div></div>`;
            let optsHtml = "";
            data.opts.forEach((o, i) => { optsHtml += `<div class="opt-cyber-btn" id="opt-${i}" onclick="selectOpt(${i})">${o}</div>`; });
            document.getElementById('options-container').innerHTML = optsHtml;
            document.getElementById('action-btn-area').innerHTML = generateUiverseBtn("পরবর্তী", "handleNext()");
            selectedAns = null;
        }

        function selectOpt(idx) {
            document.querySelectorAll('.opt-cyber-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById(`opt-${idx}`).classList.add('selected');
            selectedAns = idx;
        }

        function handleNext() {
            if(selectedAns === null) return;
            if(mode === 'create') {
                quizData.push({ q: readyQuestions[currentIndex].q, opts: readyQuestions[currentIndex].opts, ans: selectedAns });
                if(currentIndex < 9) { currentIndex++; renderStep(); } else { saveQuiz(); }
            } else {
                if(selectedAns === quizData[currentIndex].ans) score++;
                if(currentIndex < quizData.length - 1) { currentIndex++; renderPlayStep(); } else { showFinalResult(); }
            }
        }

        function saveQuiz() {
            const id = "rakib" + Math.floor(Math.random() * 899999 + 100000);
            db.ref('quizzes/' + id).set({ creator: userName, questions: quizData }).then(() => {
                showScreen('screen-final');
                const link = window.location.origin + window.location.pathname + "?id=" + id;
                document.getElementById('final-body').innerHTML = `<div style="text-align:center;"><h2 style="color:var(--accent); font-size: 2rem;">তৈরি হয়ে গেছে! 🚀</h2><div class="share-box">${link}</div>${generateUiverseBtn("লিঙ্ক কপি করুন", `copyToClipboard('${link}')`)}</div>`;
            });
        }

        function startQuiz(id) {
            if(validateName()) {
                db.ref('quizzes/' + id).once('value', snap => {
                    if(snap.exists()) { quizData = snap.val().questions; mode = 'play'; showScreen('screen-main'); renderPlayStep(); }
                });
            }
        }

        function renderPlayStep() {
            const data = quizData[currentIndex];
            document.getElementById('progress-text').innerText = `প্রশ্ন: ${currentIndex + 1} / ${quizData.length}`;
            document.getElementById('question-area').innerHTML = `<div class="q-box"><div class="q-front">${data.q}</div></div>`;
            let optsHtml = "";
            data.opts.forEach((o, i) => { optsHtml += `<div class="opt-cyber-btn" id="opt-${i}" onclick="selectOpt(${i})">${o}</div>`; });
            document.getElementById('options-container').innerHTML = optsHtml;
            document.getElementById('action-btn-area').innerHTML = generateUiverseBtn("সাবমিট", "handleNext()");
            selectedAns = null;
        }

        function showFinalResult() {
            showScreen('screen-final');
            const resultMsg = `${userName}, ঈদ মোবারক! তুমি ${score}টি সঠিক উত্তর দিয়েছ এবং ৳${score * 100} সালামি জিতেছো!`;
            document.getElementById('final-body').innerHTML = `
                <div style="text-align:center; margin-bottom: 20px;"><h2 style="color:var(--yellow-400); font-size: 1.8rem;">আপনার স্কোর: ${score}/${quizData.length}</h2></div>
                <p style="text-align:center; padding: 20px; color: #fff; font-size: 1.2rem;">${resultMsg}</p>
                <div style="display:flex; justify-content:center;">${generateUiverseBtn("হোমে ফিরে যান", "location.href=window.location.pathname")}</div>
            `;
        }

        function copyToClipboard(txt) {
            navigator.clipboard.writeText(txt).then(() => {
                const toast = document.getElementById('custom-toast');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            });
        }
        init();
    </script>
</body>
</html>
