<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eid Salami Quiz Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #0c0c0e;
            --accent: #00f2ff;
            --glass: rgba(255, 255, 255, 0.08);
            --gold: #ffcc00;
            --text-p: #e0e0e0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Hind Siliguri', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-size: 18px; /* Medium Font Size for Mobile */
        }

        .app-container {
            width: 95%;
            max-width: 420px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, rgba(0,0,0,0) 100%);
            border-radius: 30px;
            padding: 25px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 { font-size: 2.2rem; color: var(--accent); text-align: center; margin-bottom: 10px; }
        p { color: var(--text-p); text-align: center; font-size: 1.1rem; }

        /* Ready-made Question Card */
        .q-card {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 20px;
            margin-top: 20px;
            animation: fadeIn 0.5s ease;
        }

        .q-title { font-size: 1.3rem; font-weight: 600; margin-bottom: 15px; color: var(--accent); }

        /* Options */
        .opt-grid { display: grid; gap: 12px; }
        
        .opt-item {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            font-size: 1.1rem;
        }

        .opt-item.selected {
            background: rgba(0, 242, 255, 0.15);
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Fixed Footer Button */
        .footer-btn {
            background: var(--accent);
            color: #000;
            padding: 18px;
            border-radius: 15px;
            font-weight: 700;
            text-align: center;
            margin-top: auto;
            cursor: pointer;
            font-size: 1.2rem;
            box-shadow: 0 10px 20px rgba(0, 242, 255, 0.2);
        }

        .hidden { display: none; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .share-box {
            background: #1a1a1c;
            padding: 15px;
            border-radius: 10px;
            word-break: break-all;
            margin: 20px 0;
            border: 1px dashed var(--accent);
        }
    </style>
</head>
<body>

    <div class="app-container" id="main-app">
        
        <div id="screen-start">
            <h1>Eid Salami🌙</h1>
            <p>আপনার বন্ধুদের জন্য একটি দারুণ কুইজ চ্যালেঞ্জ তৈরি করুন!</p>
            <div style="margin-top: 50px;" class="footer-btn" onclick="startSetup()">কুইজ সেটআপ শুরু করুন</div>
        </div>

        <div id="screen-setup" class="hidden">
            <div id="setup-content">
                <div class="q-card">
                    <div id="step-label" style="font-size: 0.9rem; color: var(--accent); margin-bottom: 5px;">প্রশ্ন ১/১০</div>
                    <div id="current-q-text" class="q-title">আপনার প্রিয় খাবার কোনটি?</div>
                    <div class="opt-grid" id="opt-list">
                        </div>
                </div>
            </div>
            <div class="footer-btn" onclick="nextSetupStep()" id="next-btn">পরবর্তী প্রশ্ন</div>
        </div>

        <div id="screen-link" class="hidden">
            <h1>অভিনন্দন! 🎉</h1>
            <p>আপনার কুইজটি সফলভাবে তৈরি হয়েছে। নিচের লিঙ্কটি কপি করে বন্ধুদের পাঠান:</p>
            <div class="share-box" id="share-url">Coping link...</div>
            <div class="footer-btn" onclick="copyLink()">লিঙ্ক কপি করুন</div>
        </div>

    </div>

    <script>
        // Firebase Config (Replace with yours)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "https://YOUR_DATABASE.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Ready-made Questions
        const readyQuestions = [
            { q: "আমার প্রিয় খাবার কোনটি?", opts: ["বিরিয়ানি", "কাচ্চি", "ফুচকা", "বার্গার"] },
            { q: "আমি ফ্রি সময়ে কি করতে পছন্দ করি?", opts: ["মুভি দেখা", "কোডিং", "ঘুমানো", "ঘুরতে যাওয়া"] },
            { q: "আমার প্রিয় ঋতু কোনটি?", opts: ["শীত", "বর্ষা", "বসন্ত", "শরৎ"] },
            { q: "আমি চা নাকি কফি বেশি পছন্দ করি?", opts: ["দুধ চা", "রঙ চা", "কফি", "কোক"] },
            { q: "আমার ড্রিম ট্যুর কোথায় হতে পারে?", opts: ["সাজেক", "কক্সবাজার", "সিলেট", "বান্দরবান"] },
            { q: "আমি রাত জাগি নাকি সকালে উঠি?", opts: ["রাত জাগা পাখি", "খুব ভোরে উঠি", "ঠিক নেই", "সারাদিন ঘুমাই"] },
            { q: "আমার প্রিয় রঙের নাম কি?", opts: ["কালো", "নীল", "সাদা", "লাল"] },
            { q: "আমার ফেভারিট গেম কোনটি?", opts: ["PUBG/FF", "Cricket", "Football", "Ludo"] },
            { q: "আমি কার্টুন দেখতে পছন্দ করি?", opts: ["হ্যাঁ অনেক", "উমম মাঝেমাঝে", "একদম না", "আগে দেখতাম"] },
            { q: "আমাকে তোমার কেমন মনে হয়?", opts: ["খুব ভালো", "রাগী", "রহস্যময়", "পাগল"] }
        ];

        let setupIndex = 0;
        let finalQuizData = [];
        let selectedAns = null;

        function startSetup() {
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('screen-setup').classList.remove('hidden');
            renderSetupQuestion();
        }

        function renderSetupQuestion() {
            const data = readyQuestions[setupIndex];
            document.getElementById('step-label').innerText = `প্রশ্ন ${setupIndex + 1}/১০`;
            document.getElementById('current-q-text').innerText = data.q;
            
            let html = "";
            data.opts.forEach((o, i) => {
                html += `<div class="opt-item" onclick="selectOpt(${i}, this)">${o}</div>`;
            });
            document.getElementById('opt-list').innerHTML = html;
            selectedAns = null;
        }

        function selectOpt(idx, el) {
            document.querySelectorAll('.opt-item').forEach(item => item.classList.remove('selected'));
            el.classList.add('selected');
            selectedAns = idx;
        }

        function nextSetupStep() {
            if(selectedAns === null) return alert("একটি উত্তর সিলেক্ট করুন!");

            finalQuizData.push({
                q: readyQuestions[setupIndex].q,
                opts: readyQuestions[setupIndex].opts,
                ans: selectedAns
            });

            if(setupIndex < 9) {
                setupIndex++;
                renderSetupQuestion();
            } else {
                saveToFirebase();
            }
        }

        function saveToFirebase() {
            const quizID = "eid" + Math.floor(Math.random() * 899999 + 100000);
            document.getElementById('next-btn').innerText = "সেভ হচ্ছে...";
            
            db.ref('quizzes/' + quizID).set({
                questions: finalQuizData,
                timestamp: Date.now()
            }).then(() => {
                document.getElementById('screen-setup').classList.add('hidden');
                document.getElementById('screen-link').classList.remove('hidden');
                const url = window.location.href.split('?')[0] + "?id=" + quizID;
                document.getElementById('share-url').innerText = url;
            });
        }

        function copyLink() {
            const text = document.getElementById('share-url').innerText;
            navigator.clipboard.writeText(text);
            alert("লিঙ্ক কপি হয়েছে! বন্ধুদের পাঠিয়ে দাও।");
        }
    </script>
</body>
</html>
